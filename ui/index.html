<!DOCTYPE html>
<html>
<head>
    <title>CV</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="cv-container">
    <iframe
            class="cv-frame"
            src="CV.pdf#zoom=page-width">
    </iframe>
</div>

<div class="subscribe-box">
    <form id="subscribe-form">
        <label for="subscriber-email">
            Get CV updates
        </label>

        <input
                id="subscriber-email"
                name="email"
                type="email"
                placeholder="Email address"
                required
        >

        <button type="submit">Subscribe</button>

        <p id="subscribe-status" aria-live="polite"></p>
    </form>
</div>

<div class="stats-box">
    Views: <span id="view-count">...</span>
</div>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
</body>
</html>
