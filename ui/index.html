<!DOCTYPE html>
<html>
<head>
    <title>CV</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="cv-container">
    <iframe
            class="cv-frame"
            src="CV.pdf#zoom=page-width">
    </iframe>
</div>

<form id="subscribe-form" class="subscribe-form">
    <label for="subscriber-email">
        Get notified when my CV is updated
    </label>

    <div class="subscribe-controls">
        <input
                id="subscriber-email"
                name="email"
                type="email"
                placeholder="you@example.com"
                maxlength="254"
                required
        >

        <button type="submit">Subscribe</button>
    </div>

    <p id="subscribe-status" aria-live="polite"></p>
</form>

<div class="stats-box">
    Views: <span id="view-count">...</span>
</div>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
</body>
</html>
