name: Feature Branch

on:
  push:
    branches:
      - "feature/**"
jobs:
  check-ui-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check
        run: |
          if git diff --name-only origin/main...HEAD | grep '^ui/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-cv-pdf:
    needs: check-ui-changes
    if: needs.check-ui-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: ls -R ui

      - uses: xu-cheng/latex-action@v3
        with:
          root_file: ui/CV.tex

      - name: Build CV PDF
        run: |
          if ! pdflatex ui/CV.tex; then
            echo "===== ERRORS ====="
            grep "^!" ui/CV.log || true
          
            echo ""
            echo "===== WARNINGS ====="
            grep -i "warning" ui/CV.log || true
          
            exit 1
          fi